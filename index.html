<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consolidated Event Creation — Highspot Prototype</title>
  <!--
    Feature: Consolidated Event Creation (Humana / Event-Based Learning)
    Persona: Learning Administrator
    Goal: Create an event with sessions and essential configuration in one guided flow
    Out-of-scope: Backend/API, Enrollment/Registration/Reports tabs, full Settings editors,
      Event Completion/Roles/Messages/Notifications, legacy disjointed flow comparison
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <style>
    :root {
      --nav-blue: #0c2340;
      --nav-blue-mid: #123a5c;
      --primary: #0073bb;
      --primary-hover: #005a94;
      --teal: #00838f;
      --teal-light: #e0f4f6;
      --teal-border: #00838f;
      --surface: #ffffff;
      --canvas-bg: #eef1f4;
      --border: #d4dbe3;
      --text: #1a1a1a;
      --muted: #5c6570;
      --footer-bg: #f5f7f9;
      --sidebar-bg: #f0f3f6;
      --info-banner: #e8f4fc;
      --danger: #c62828;
      --success: #2e7d32;
      --shadow: 0 12px 40px rgba(12, 35, 64, 0.18);
      --radius: 8px;
      --radius-sm: 4px;
      --font: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      --banner-blue: #0066cc;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      background: var(--canvas-bg);
      min-height: 100vh;
    }

    /* ========== App shell ========== */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .top-nav {
      height: 52px;
      background: linear-gradient(180deg, var(--nav-blue-mid) 0%, var(--nav-blue) 100%);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      font-weight: 700;
      letter-spacing: 0.04em;
      font-size: 14px;
      white-space: nowrap;
    }

    .search-wrap { flex: 1; max-width: 520px; margin: 0 auto; position: relative; }
    .search-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.55);
      font-size: 13px;
    }

    .search {
      width: 100%;
      height: 34px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.12);
      color: #e8eef4;
      padding: 0 12px 0 36px;
      font-size: 13px;
      outline: none;
    }
    .search::placeholder { color: rgba(255,255,255,0.55); }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .btn-new {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 14px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-new:hover { background: var(--primary-hover); }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.08); }

    .badge {
      position: absolute;
      top: 2px;
      right: 2px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #6b8cae;
      border: 2px solid rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }

    .body-row {
      display: flex;
      flex: 1;
      min-height: 0;
      position: relative;
    }

    .icon-rail {
      width: 48px;
      background: var(--nav-blue);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      gap: 4px;
      flex-shrink: 0;
      z-index: 5;
    }

    .icon-rail button {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.75);
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    .icon-rail button:hover { color: #fff; background: rgba(255,255,255,0.08); }

    .main-bg {
      flex: 1;
      background: var(--canvas-bg);
      min-height: calc(100vh - 52px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .home-launchpad {
      width: 100%;
      max-width: 560px;
    }

    .home-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px;
      text-align: center;
    }

    .home-card-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      background: var(--teal-light);
      color: var(--teal);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .home-card-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 10px;
      color: var(--text);
    }

    .home-card-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      margin: 0 0 24px;
    }

    .home-steps {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
      padding: 12px 16px;
      background: var(--info-banner);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
    }

    .home-step-sep {
      color: var(--muted);
      font-size: 10px;
      opacity: 0.7;
    }

    .home-cta {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px 16px;
      font-size: 14px;
    }

    .home-reset {
      font-size: 12px;
    }

    .home-secondary-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .home-load-sample {
      font-size: 12px;
      font-weight: 600;
    }

    /* ========== Modal ========== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(12, 35, 64, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }
    .overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal--learning { width: min(640px, 96vw); max-height: min(88vh, 720px); }
    .modal--wizard {
      width: min(920px, 96vw);
      max-height: min(92vh, 860px);
      min-height: min(520px, 80vh);
    }

    .modal-header {
      background: var(--primary);
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .modal-header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .modal-close:hover { background: rgba(255,255,255,0.15); }

    .modal-header--wizard {
      background: #fff;
      color: var(--text);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header--wizard .modal-header-title {
      margin: 0;
      font-weight: 700;
      font-size: 15px;
    }

    .modal-close--neutral {
      width: 28px;
      height: 28px;
      background: #fff;
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-size: 14px;
    }
    .modal-close--neutral:hover { background: #f8f9fb; }

    .modal-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .modal-footer {
      background: var(--footer-bg);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .footer-right { display: flex; gap: 10px; align-items: center; }

    .btn {
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }
    .btn:hover:not(:disabled) { background: #f8f9fb; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); border-color: var(--primary-hover); }

    .btn-teal {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }
    .btn-teal:hover:not(:disabled) { background: #006974; border-color: #006974; }

    /* ========== New Learning cards ========== */
    .learning-list { padding: 8px 0; }

    .learning-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .learning-card:hover { background: #f8fafb; }
    .learning-card.selected {
      background: var(--teal-light);
      border-left-color: var(--teal-border);
    }

    .learning-card-icon {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--primary);
    }

    .learning-card-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .learning-card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    /* ========== Wizard ========== */
    .wizard-body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .wizard-sidebar {
      width: 230px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: #fff;
      padding: 20px 0;
    }

    .wizard-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 400px;
    }

    .wizard-main .modal-body {
      flex: 1;
      overflow-y: auto;
    }

    .wizard-stepper {
      list-style: none;
      margin: 0;
      padding: 0;
      position: relative;
    }

    .wizard-stepper::before {
      content: "";
      position: absolute;
      left: 31px;
      top: 25px;
      bottom: 25px;
      width: 2px;
      background: var(--border);
      z-index: 0;
    }

    .stepper-step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      margin: 0 0 4px;
      position: relative;
      z-index: 1;
    }

    .stepper-step:last-child {
      margin-bottom: 0;
    }

    .stepper-step.active {
      background: var(--teal-light);
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    }

    .stepper-step.active::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--teal);
    }

    .stepper-step__indicator {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      background: #fff;
      border: 2px solid var(--border);
      color: var(--muted);
    }

    .stepper-step.active .stepper-step__indicator {
      background: var(--teal);
      border-color: var(--teal);
      color: #fff;
    }

    .stepper-step.complete .stepper-step__indicator {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
      font-size: 11px;
    }

    .stepper-step__label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .stepper-step.active .stepper-step__label {
      font-weight: 600;
    }

    .stepper-step.upcoming .stepper-step__label {
      color: var(--muted);
    }

    .wizard-content { padding: 24px; }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .req { color: var(--danger); }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(0,115,187,0.15);
    }

    .form-textarea { min-height: 80px; resize: vertical; }

    .banner-upload-placeholder {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      background: #fafbfc;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .banner-upload-placeholder.has-preview {
      padding: 0;
      min-height: 120px;
    }

    .banner-upload-placeholder img,
    .event-banner-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .event-banner.has-image {
      background: #e8f4fc;
      overflow: hidden;
    }

    .form-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .form-label-row .form-label {
      margin-bottom: 0;
    }

    .form-label-row .hint-row {
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .hint-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .text-link {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
    }

    .chip-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: #eef1f4;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
    }

    .chip-tag .remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      font-size: 14px;
      line-height: 1;
    }

    .chip-input {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 10px;
      background: #fff;
      cursor: text;
    }

    .chip-input:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(0,115,187,0.15);
    }

    .chip-input input {
      flex: 1;
      min-width: 120px;
      border: none;
      outline: none;
      padding: 4px 0;
      font-family: inherit;
      font-size: 13px;
      background: transparent;
    }

    .chip-input input::placeholder {
      color: var(--muted);
    }

    .form-row { display: flex; gap: 16px; }
    .form-row > * { flex: 1; }

    .info-banner {
      background: var(--info-banner);
      border: 1px solid #b8d9f0;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--nav-blue);
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .info-banner i { margin-top: 2px; color: var(--primary); flex-shrink: 0; }
    .info-banner .dismiss {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      padding: 0;
    }

    /* ========== Sessions step ========== */
    .sessions-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .sessions-header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .session-cards { margin-bottom: 20px; }

    .session-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      background: #fff;
      position: relative;
    }

    .session-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .session-card-title {
      font-weight: 700;
      font-size: 15px;
      margin-right: 12px;
    }

    .badge-upcoming {
      display: inline-block;
      padding: 2px 8px;
      background: #e3f2fd;
      color: var(--primary);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
      vertical-align: middle;
    }

    .session-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .session-meta span { display: flex; align-items: center; gap: 6px; }
    .session-meta i { color: var(--primary); width: 14px; }

    .session-provider {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .session-provider .integration-logo {
      width: 18px;
      height: 18px;
      font-size: 10px;
      border-radius: 3px;
    }

    .session-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .empty-sessions {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      color: var(--muted);
      margin-bottom: 20px;
      background: #fafbfc;
    }
    .empty-sessions i { font-size: 28px; color: var(--primary); margin-bottom: 8px; display: block; }

    .step2-empty-state {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      color: var(--muted);
      margin-bottom: 16px;
      background: #fafbfc;
      font-size: 13px;
    }

    .step2-empty-state i {
      font-size: 24px;
      color: var(--primary);
      margin-bottom: 8px;
      display: block;
    }

    .add-another-session {
      margin-top: 12px;
    }

    .add-another-session .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }

    .session-form-panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      background: #fafbfc;
    }

    .session-form-panel h4 {
      margin: 0 0 16px;
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
    }

    .radio-group label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      font-weight: 400;
      font-size: 13px;
      cursor: pointer;
      line-height: 1.4;
    }
    .radio-group input { margin-top: 3px; accent-color: var(--primary); flex-shrink: 0; }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 400;
      cursor: pointer;
      margin-top: 8px;
    }

    /* ========== Configuration step ========== */
    .config-section {
      margin-bottom: 24px;
    }

    .config-section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .config-section-title i { color: var(--muted); font-size: 13px; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .toggle {
      width: 44px;
      height: 24px;
      background: #ccc;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .toggle.on { background: var(--primary); }
    .toggle::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;

    // ==== STRINGS / CONSTANTS ====

      "8:00 AM", "8:30 AM", "9:00 AM", "9:30 AM", "10:00 AM", "10:30 AM",

      { id: "teams", name: "Microsoft Teams", logoClass: "teams", icon: "fa-brands fa-microsoft" },

    const SAMPLE_BANNER_DATA_URL = "data:image/svg+xml," + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="960" height="200">' +
      '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">' +

      '<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="white" ' +
      'font-family="Inter,sans-serif" font-size="22" font-weight="600">Clinical Excellence Summit 2026</text></svg>'
    );

    function defaultIntegrations() {
      return {
        zoom: { linked: true, email: "david.davidson@highspot.com", linkedOn: "12/23/2025" },
        teams: { linked: true, email: "david.davidson@highspot.com", linkedOn: "3/31/2026" },
        meet: { linked: false, email: null, linkedOn: null },
      };
    }

    // ==== STATE ====
    function getDefaultState() {
      return {
        route: "home",
        modal: null,
        wizardStep: 1,
        selectedLearningType: "event",
        bannerDismissed: { overview: false },
        event: {
          title: "",
          description: "",
          spot: "",
          bannerImage: null,
          contact: "David Davidson",
          contactEmail: "david.davidson@highspot.com",
          sessionInstructors: ["David Davidson"],
        },
        sessions: [],
        editingSessionId: null,
        sessionForm: emptySessionForm(),
        config: {
          learningPaths: "yes",
          enrollment: "invite",
          sessionReg: "no-self",
          regAttendance: "single",
          autoAttendance: "opt-out",
          selfMark: false,
        },
        integrations: defaultIntegrations(),
        created: false,
        activeTab: "overview",
        showValidation: false,
        showSessionFormValidation: false,
        integrationsPanelOpen: false,
        wizardBackdrop: "home",
      };
    }

    function resetForNewEvent() {
      const defaults = getDefaultState();
      state.event = { ...defaults.event };
      state.sessions = [];
      state.sessionForm = emptySessionForm();
      state.config = { ...defaults.config };
      state.integrations = defaultIntegrations();
      state.editingSessionId = null;
      state.showValidation = false;
      state.showSessionFormValidation = false;
      state.integrationsPanelOpen = false;
      state.created = false;
      state.wizardStep = 1;
    }

    function emptySessionForm() {
      return {
        title: "",
        description: "",
        instructors: ["David Davidson"],
        timezone: TIMEZONES[0],
        date: "",
        startTime: "",
        endTime: "",
        regMin: "",
        regMax: "",
        waitlist: false,
        type: "virtual",
        conferenceProvider: "",
      };
    }

    function addDaysToDateString(dateStr, days) {
      if (!dateStr) return "";
      const d = new Date(dateStr + "T12:00:00");
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    }

    function carryForwardSessionForm(savedSession) {
      const { id, ...fields } = savedSession;
      return {
        ...fields,
        title: "",
        description: "",
        date: addDaysToDateString(savedSession.date, 1),
      };
    }

    function getSampleEventData() {
      const today = new Date();
      const date1 = today.toISOString().slice(0, 10);
      const date2 = addDaysToDateString(date1, 1);
      return {
        event: {
          title: "Clinical Excellence Summit 2026",
          description: "Join us for two days of clinical training, best practices, and collaborative learning across virtual sessions.",
          spot: "Test Design Spot",
          bannerImage: SAMPLE_BANNER_DATA_URL,
          contact: "David Davidson",
          contactEmail: "david.davidson@highspot.com",
          sessionInstructors: ["David Davidson", "Sarah Chen"],
        },
        sessions: [
          {
            id: "s-sample-1",
            title: "Opening Keynote: Patient-Centered Care",
            description: "Overview of care delivery models and engagement strategies.",
            instructors: ["David Davidson"],
            timezone: TIMEZONES[0],
            date: date1,
            startTime: "9:00 AM",
            endTime: "10:30 AM",
            regMin: "10",
            regMax: "100",
            waitlist: true,
            type: "virtual",
            conferenceProvider: "zoom",
          },
          {
            id: "s-sample-2",
            title: "Team Collaboration Workshop",
            description: "Hands-on session for cross-functional care teams.",
            instructors: ["Sarah Chen", "David Davidson"],
            timezone: TIMEZONES[0],
            date: date2,
            startTime: "2:00 PM",
            endTime: "3:30 PM",
            regMin: "",
            regMax: "50",
            waitlist: false,
            type: "virtual",
            conferenceProvider: "teams",
          },
        ],
        config: {
          learningPaths: "yes",
          enrollment: "invite",
          sessionReg: "no-self",
          regAttendance: "single",
          autoAttendance: "auto",
          selfMark: false,
        },
        integrations: defaultIntegrations(),
      };
    }

    function loadSampleEvent() {
      const sample = getSampleEventData();
      state.event = { ...sample.event };
      state.sessions = [...sample.sessions];
      state.config = { ...sample.config };
      state.integrations = { ...sample.integrations };
      state.sessionForm = emptySessionForm();
      state.editingSessionId = null;
      state.showValidation = false;
      state.showSessionFormValidation = false;
      state.integrationsPanelOpen = false;
      state.created = true;
      state.activeTab = "overview";
      state.modal = null;
      state.bannerDismissed = { overview: false };
      saveState(state);
      navigate("#overview");
    }

    function syncSessionFormInstructorsFromEvent() {
      if (state.sessions.length === 0 && !state.editingSessionId && state.event.sessionInstructors?.length) {
        state.sessionForm.instructors = [...state.event.sessionInstructors];
      }
    }

    function getState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return getDefaultState();
        const saved = JSON.parse(raw);
        const defaults = getDefaultState();
        return {
          ...defaults,
          ...saved,
          event: { ...defaults.event, ...(saved.event || {}) },
          config: { ...defaults.config, ...(saved.config || {}) },
          integrations: { ...defaults.integrations, ...(saved.integrations || {}) },
          sessionForm: { ...emptySessionForm(), ...(saved.sessionForm || {}) },
          bannerDismissed: { ...defaults.bannerDismissed, ...(saved.bannerDismissed || {}) },
        };
      } catch {
        return getDefaultState();
      }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    let state = getState();

    // ==== ROUTING ====
    function parseHash() {
      const hash = location.hash.slice(1) || "home";
      if (hash === "home") return { route: "home", modal: null, wizardStep: 1 };
      if (hash === "new-learning") return { route: "home", modal: "learning", wizardStep: 1 };
      if (hash === "overview") return { route: "overview", modal: null, wizardStep: 3 };
      const createMatch = hash.match(/^create\/(\d)$/);
      if (createMatch) {
        return {
          route: state.wizardBackdrop === "overview" ? "overview" : "home",
          modal: "wizard",
          wizardStep: parseInt(createMatch[1], 10),
        };
      }
      return { route: "home", modal: null, wizardStep: 1 };
    }

    function navigate(hash) {
      location.hash = hash;
    }

    window.addEventListener("hashchange", () => {
      const parsed = parseHash();
      state.route = parsed.route;
      state.modal = parsed.modal;
      state.wizardStep = parsed.wizardStep;
      if (parsed.route === "overview" && !state.created) {
        state.created = true;
      }
      saveState(state);
      render();
    });

    // ==== HELPERS ====
    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    function renderChipInput(chips, { ariaLabel, removeAction }) {
      const chipHtml = chips.map((name, i) => `
        <span class="chip-tag">
          ${escapeHtml(name)}
          <button type="button" class="remove" data-action="${removeAction}" data-index="${i}" aria-label="Remove ${escapeHtml(name)}">&times;</button>
        </span>
      `).join("");
      return `
        <div class="chip-input" role="combobox" aria-label="${escapeHtml(ariaLabel)}">
          ${chipHtml}
          <input type="text"${chips.length ? "" : ' placeholder="Search people…"'} />
        </div>
      `;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr + "T12:00:00");
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    function calcDuration(start, end) {
      if (!start || !end) return "";
      const diff = timeToMinutes(end) - timeToMinutes(start);
      if (diff <= 0) return "";
      if (diff < 60) return diff + " minutes";
      const hrs = Math.floor(diff / 60);
      const mins = diff % 60;
      return mins ? hrs + " hr " + mins + " min" : hrs + " hour" + (hrs > 1 ? "s" : "");
    }

    function timeToMinutes(t) {
      const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (!m) return 0;
      let h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      const pm = m[3].toUpperCase() === "PM";
      if (pm && h !== 12) h += 12;
      if (!pm && h === 12) h = 0;
      return h * 60 + min;
    }

    function isTimeRangeValid(start, end) {
      if (!start || !end) return false;
      return timeToMinutes(end) > timeToMinutes(start);
    }

    function getTimezoneOffsetLabel(timezone) {
      const match = (timezone || "").match(/\(GMT[^)]+\)/);
      return match ? match[0].replace(/[()]/g, "") : "GMT";
    }

    function formatEventDateRange(sessions) {
      if (!sessions.length) return "No sessions added yet";
      if (sessions.length === 1) return formatDate(sessions[0].date);
      const sorted = [...sessions].sort((a, b) => a.date.localeCompare(b.date));
      const first = sorted[0].date;
      const last = sorted[sorted.length - 1].date;
      if (first === last) return `${formatDate(first)} · ${sessions.length} sessions`;
      const firstFmt = formatDate(first).replace(/, \d{4}$/, "");
      return `${firstFmt} – ${formatDate(last)} · ${sessions.length} sessions`;
    }

    function isBannerDataUrl(value) {
      return typeof value === "string" && value.startsWith("data:image");
    }

    function renderBannerPreviewHtml(bannerImage, { alt }) {
      if (isBannerDataUrl(bannerImage)) {
        return `<img src="${bannerImage}" alt="${escapeHtml(alt)}" />`;
      }
      return bannerImage ? escapeHtml(bannerImage) : "No Image Uploaded";
    }

    function needsConferenceProvider(type) {
      return type === "virtual" || type === "hybrid";
    }

    function getLinkedProviders() {
      return INTEGRATION_DEFS.filter((d) => state.integrations[d.id]?.linked);
    }

    function getSessionTypeDisplay(type) {
      if (type === "virtual") return { label: "Virtual", icon: "fa-video" };
      if (type === "hybrid") return { label: "Hybrid", icon: "fa-laptop" };
      return { label: "In Person", icon: "fa-location-dot" };
    }

    function getSessionFormErrors(form) {
      const errors = {};
      if (!form.title.trim()) errors.title = "Title is required";
      if (!form.date) errors.date = "Session date is required";
      if (!form.startTime) errors.startTime = "Start time is required";
      if (!form.endTime) errors.endTime = "End time is required";
      else if (form.startTime && !isTimeRangeValid(form.startTime, form.endTime)) {
        errors.endTime = "End time must be after start time";
      }
      if (!form.instructors.length) errors.instructors = "At least one instructor is required";
      if (needsConferenceProvider(form.type)) {
        if (!form.conferenceProvider) errors.conferenceProvider = "Select a conference provider";
        else if (!getLinkedProviders().some((p) => p.id === form.conferenceProvider)) {
          errors.conferenceProvider = "Selected provider must be linked";
        }
      }
      return errors;
    }

    function sessionFormValid(form) {
      return Object.keys(getSessionFormErrors(form)).length === 0;
    }

    function eventStepValid() {
      return state.event.title.trim().length > 0 && state.event.spot.trim().length > 0;
    }

    function sessionsStepValid() {
      return state.sessions.length > 0;
    }

    // ==== RENDER: Shell ==========

      const steps = STRINGS.steps.map((label, i) => {
        const sep = i < STRINGS.steps.length - 1
          ? '<span class="home-step-sep"><i class="fa-solid fa-chevron-right"></i></span>'
          : "";

      return `

              <button type="button" class="btn btn-primary home-cta" data-action="open-event-wizard">${STRINGS.home.cta}</button>
              <div class="home-secondary-actions">
                <button type="button" class="link-action home-load-sample" data-action="load-sample-event">${STRINGS.home.loadSample}</button>

            </div>

      `;
    }

    // ==== RENDER: New Learning Modal ====

      const cards = STRINGS.learningTypes.map((t) => `
        <div class="learning-card ${state.selectedLearningType === t.id ? "selected" : ""}" data-action="select-learning" data-id="${t.id}">
          <div class="learning-card-icon"><i class="fa-solid ${t.icon}"></i></div>
          <div>
            <div class="learning-card-title">${escapeHtml(t.title)}</div>
            <div class="learning-card-desc">${escapeHtml(t.desc)}</div>
          </div>
        </div>
      `).join("");

      return `
        <div class="overlay" role="dialog" aria-modal="true">
          <div class="modal modal--learning">
            <div class="modal-header">
              <div class="modal-header-title">
                <i class="fa-solid fa-graduation-cap"></i>
                ${STRINGS.newLearning}
              </div>
              <button type="button" class="modal-close" data-action="close-modal" aria-label="Close">
                <i class="fa-solid fa-xmark"></i>

    // ==== RENDER: Wizard Side Stepper ====
    function renderSideStepper() {
      const steps = STRINGS.steps.map((label, i) => {
        const step = i + 1;
        const cls = step === state.wizardStep ? "active"
          : step < state.wizardStep ? "complete" : "upcoming";
        const indicator = step < state.wizardStep
          ? '<i class="fa-solid fa-check" aria-hidden="true"></i>'
          : step;
        const ariaCurrent = step === state.wizardStep ? ' aria-current="step"' : "";
        return `
          <li class="stepper-step ${cls}"${ariaCurrent}>
            <span class="stepper-step__indicator">${indicator}</span>
            <span class="stepper-step__label">${escapeHtml(label)}</span>
          </li>
        `;
      }).join("");

      return `
        <nav class="wizard-sidebar" aria-label="Create event steps">
          <ol class="wizard-stepper">${steps}</ol>
        </nav>
      `;
    }

    // ==== RENDER: Wizard Step 1 ====
    function renderStep1() {
      return `
        <div class="wizard-content">
          <div class="form-group">
            <label class="form-label">Title <span class="req">*</span></label>
            <input class="form-input" type="text" data-field="event.title" value="${escapeHtml(state.event.title)}" />

          <div class="form-group">
            <div class="form-label-row">
              <label class="form-label">Description</label>
              <div class="hint-row">
                <span style="color:var(--muted)"><i class="fa-regular fa-circle-question"></i></span>
                <button type="button" class="text-link">Text Preview</button>
              </div>
            </div>
            <textarea class="form-textarea" data-field="event.description">${escapeHtml(state.event.description)}</textarea>
          </div>
          <div class="form-group">

            </select>

          <div class="info-banner">

              ${renderConfigRadios("regAttendance", "regAttendance", [
                { value: "single", label: "Register for a single session and attend that session" },
                { value: "all-all", label: "Register for all sessions and attend all sessions" },
                { value: "all-one", label: "Register for all sessions and attend at least one session" },
              ])}

          </div>
          <div class="form-group">
            <label class="form-label">Event Banner Image</label>
            <div class="banner-upload-placeholder${isBannerDataUrl(state.event.bannerImage) ? " has-preview" : ""}">${renderBannerPreviewHtml(state.event.bannerImage, { alt: "Event banner preview" })}</div>
