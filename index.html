            <button type="button" class="btn" data-action="upload-banner">Upload Image</button>
          </div>
          <div class="form-group">
            <label class="form-label">Session Instructors</label>
            ${renderChipInput(state.event.sessionInstructors || [], {
              ariaLabel: "Session Instructors",
              removeAction: "remove-event-instructor",
            })}
          </div>
        </div>
      `;
    }

    // ==== RENDER: Session card ====
    function renderSessionCard(session) {
      const duration = calcDuration(session.startTime, session.endTime);
      const { label: typeLabel, icon: typeIcon } = getSessionTypeDisplay(session.type);
      const tzLabel = getTimezoneOffsetLabel(session.timezone);
      const providerDef = INTEGRATION_DEFS.find((d) => d.id === session.conferenceProvider);
      const regParts = [];
      if (session.regMin) regParts.push(`Min ${session.regMin}`);
      if (session.regMax) regParts.push(`Max ${session.regMax}`);
      if (session.waitlist) regParts.push("Waitlist enabled");
      const regMeta = regParts.length ? regParts.join(" · ") : null;
      const providerMeta = needsConferenceProvider(session.type) && providerDef ? `
        <span class="session-provider">
          <span class="integration-logo ${providerDef.logoClass}">
            <i class="${providerDef.icon.startsWith("fa-brands") ? providerDef.icon : "fa-solid " + providerDef.icon}"></i>
          </span>
          ${escapeHtml(PROVIDER_LABELS[session.conferenceProvider])}
        </span>
      ` : "";

      return `
        <div class="session-card" data-session-id="${session.id}">
          <div class="session-card-header">
            <div>
              <span class="session-card-title">${escapeHtml(session.title)}</span>
              <span class="badge-upcoming">Upcoming</span>
            </div>
            <button type="button" class="icon-btn" style="color:var(--muted);width:28px;height:28px" data-action="remove-session" data-id="${session.id}" title="Remove">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
          <div class="session-meta">
            <span><i class="fa-regular fa-calendar"></i> ${formatDate(session.date)}</span>
            <span><i class="fa-regular fa-clock"></i> ${escapeHtml(session.startTime)} ${escapeHtml(tzLabel)}</span>
            ${duration ? `<span><i class="fa-regular fa-hourglass"></i> ${duration}</span>` : ""}
            <span><i class="fa-solid ${typeIcon}"></i> ${typeLabel}</span>
            ${providerMeta}
          </div>
          <div class="session-meta">
            <span><i class="fa-regular fa-user"></i> ${escapeHtml(session.instructors.join(", "))}</span>
            <span><i class="fa-solid fa-users"></i> 0 Learners Registered</span>
            ${regMeta ? `<span><i class="fa-solid fa-ticket"></i> ${escapeHtml(regMeta)}</span>` : ""}
          </div>
          <div class="session-card-actions">
            <button type="button" class="btn btn-primary" style="font-size:12px;padding:6px 12px" data-action="edit-session" data-id="${session.id}">Edit Session</button>
          </div>
        </div>
      `;
    }

    // ==== RENDER: Session form ====
    function renderIntegrationsPanel() {
      return `
        <div class="integrations-panel">
          ${INTEGRATION_DEFS.map((def) => {
            const info = state.integrations[def.id];
            const linked = info?.linked;
            const iconClass = def.icon.startsWith("fa-brands") ? def.icon : "fa-solid " + def.icon;
            return `
              <div class="integration-row">
                <div class="integration-logo ${def.logoClass}">
                  <i class="${iconClass}"></i>
                </div>
                <div class="integration-details">
                  <div class="integration-name">${escapeHtml(def.name)}</div>
                  ${linked ? `
                    <div class="integration-meta">Account: ${escapeHtml(info.email)}</div>
                    <div class="integration-meta">Linked on: ${escapeHtml(info.linkedOn)}</div>
                  ` : `<div class="integration-meta">Not linked</div>`}
                </div>
                <div class="integration-action">
                  ${linked ? `
                    <button type="button" class="link-action" data-action="unlink-integration" data-provider="${def.id}">
                      <i class="fa-solid fa-link-slash"></i> Unlink Account
                    </button>
                  ` : `
                    <button type="button" class="btn-link-account" data-action="link-integration" data-provider="${def.id}">Link Account</button>
                  `}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderConferenceSection(f) {
      if (!needsConferenceProvider(f.type)) return "";
      const linked = getLinkedProviders();
      const noneLinked = linked.length === 0;
      const errors = state.showSessionFormValidation ? getSessionFormErrors(f) : {};
      const options = linked.map((p) =>
        `<option value="${p.id}" ${f.conferenceProvider === p.id ? "selected" : ""}>${escapeHtml(PROVIDER_LABELS[p.id])}</option>`
      ).join("");

      return `
        <div class="conference-section form-group">
          <label class="form-label">Select Conference Provider <span class="req">*</span></label>
          <select class="form-select" data-field="sessionForm.conferenceProvider">
            <option value="">Select…</option>
            ${options}
          </select>
          ${errors.conferenceProvider ? `<div class="validation-msg">${errors.conferenceProvider}</div>` : ""}
          <p class="conference-helper">Save your session to automatically generate the video conferencing link.</p>
          <p class="conference-helper integrations-settings-note">Accounts can also be linked in Settings. Link here for quick access.</p>
          <div class="integrations-quick-access">
            <span class="integrations-quick-text">
              ${noneLinked
                ? 'No accounts linked. <button type="button" class="text-link" data-action="toggle-integrations-panel">Link account</button>'
                : `${linked.length} account${linked.length > 1 ? "s" : ""} linked. <button type="button" class="text-link" data-action="toggle-integrations-panel">Manage video accounts</button>`}
            </span>
          </div>
          ${state.integrationsPanelOpen ? renderIntegrationsPanel() : ""}
        </div>
      `;
    }

    function renderSessionForm() {
      const f = state.sessionForm;
      const isEdit = state.editingSessionId !== null;
      const errors = state.showSessionFormValidation ? getSessionFormErrors(f) : {};
      return `
        <div class="session-form-panel" id="session-form-panel">
          <h4><i class="fa-solid fa-${isEdit ? "pen" : "plus"}"></i> ${isEdit ? "Edit Session" : "Add Session"}</h4>
          <div class="form-group">
            <label class="form-label">Title <span class="req">*</span></label>
            <input class="form-input" type="text" data-field="sessionForm.title" value="${escapeHtml(f.title)}" />
            ${errors.title ? `<div class="validation-msg">${errors.title}</div>` : ""}
          </div>
          <div class="form-group">
            <div class="form-label-row">
              <label class="form-label">Description</label>
              <div class="hint-row">
                <span style="color:var(--muted)"><i class="fa-regular fa-circle-question"></i></span>
                <button type="button" class="text-link">Text Preview</button>
              </div>
            </div>
            <textarea class="form-textarea" data-field="sessionForm.description">${escapeHtml(f.description)}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Instructors <span class="req">*</span></label>
            ${renderChipInput(f.instructors, { ariaLabel: "Instructors", removeAction: "remove-instructor" })}
            ${errors.instructors ? `<div class="validation-msg">${errors.instructors}</div>` : ""}
          </div>
          <div class="form-group">
            <label class="form-label">Timezone</label>
            <select class="form-select" data-field="sessionForm.timezone">
              ${TIMEZONES.map((tz) => `<option ${f.timezone === tz ? "selected" : ""}>${escapeHtml(tz)}</option>`).join("")}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Session Date <span class="req">*</span></label>
            <input class="form-input" type="date" data-field="sessionForm.date" value="${escapeHtml(f.date)}" />
            ${errors.date ? `<div class="validation-msg">${errors.date}</div>` : ""}
          </div>
          <div class="form-row form-group">
            <div>
              <label class="form-label">Start Time <span class="req">*</span></label>
              <select class="form-select" data-field="sessionForm.startTime">
                <option value="">Select…</option>
                ${TIME_OPTIONS.map((t) => `<option value="${t}" ${f.startTime === t ? "selected" : ""}>${t}</option>`).join("")}
              </select>
              ${errors.startTime ? `<div class="validation-msg">${errors.startTime}</div>` : ""}
            </div>
            <div>
              <label class="form-label">End Time <span class="req">*</span></label>
              <select class="form-select" data-field="sessionForm.endTime">
                <option value="">Select…</option>
                ${TIME_OPTIONS.map((t) => `<option value="${t}" ${f.endTime === t ? "selected" : ""}>${t}</option>`).join("")}
              </select>
              ${errors.endTime ? `<div class="validation-msg">${errors.endTime}</div>` : ""}
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Registration Limit</label>
            <div class="form-row">
              <div>
                <label class="form-label" style="font-weight:400;font-size:12px">Minimum</label>
                <input class="form-input" type="number" data-field="sessionForm.regMin" value="${escapeHtml(f.regMin)}" placeholder="No Minimum" />
              </div>
              <div>
                <label class="form-label" style="font-weight:400;font-size:12px">Maximum</label>
                <input class="form-input" type="number" data-field="sessionForm.regMax" value="${escapeHtml(f.regMax)}" placeholder="No Maximum" />
              </div>
            </div>
            <label class="checkbox-label">
              <input type="checkbox" data-field="sessionForm.waitlist" ${f.waitlist ? "checked" : ""} />
              Enable waitlists when limit is reached
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">Session Type</label>
            <div class="radio-group session-type-radios">
              <label><input type="radio" name="sessionType" value="virtual" data-field="sessionForm.type" ${f.type === "virtual" ? "checked" : ""} /> Virtual</label>
              <label><input type="radio" name="sessionType" value="in-person" data-field="sessionForm.type" ${f.type === "in-person" ? "checked" : ""} /> In Person</label>
              <label><input type="radio" name="sessionType" value="hybrid" data-field="sessionForm.type" ${f.type === "hybrid" ? "checked" : ""} /> Hybrid</label>
            </div>
          </div>
          ${renderConferenceSection(f)}
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
            ${isEdit ? '<button type="button" class="btn" data-action="cancel-edit-session">Cancel Edit</button>' : ""}
            <button type="button" class="btn btn-primary" data-action="save-session">${isEdit ? "Update Session" : "Add Session"}</button>
          </div>
        </div>
      `;
    }

    // ==== RENDER: Wizard Step 2 ====
    function renderStep2() {
      const cards = state.sessions.length
        ? `<div class="session-cards">${state.sessions.map(renderSessionCard).join("")}</div>`
        : `<div class="step2-empty-state"><i class="fa-regular fa-calendar-plus"></i>Add your first session below</div>`;

      const addAnotherBtn = `
        <div class="add-another-session">
          <button type="button" class="btn" data-action="add-another-session">
            <i class="fa-solid fa-plus"></i> ${STRINGS.addAnotherSession}
          </button>
        </div>
      `;

      return `
        <div class="wizard-content">
          <div class="sessions-header">
            <h3>Sessions</h3>
          </div>
          ${cards}
          ${renderSessionForm()}
          ${state.sessions.length > 0 && !state.editingSessionId ? addAnotherBtn : ""}
          ${state.showValidation && !sessionsStepValid() ? '<div class="validation-msg" style="margin-top:12px">Add at least one session to continue.</div>' : ""}
        </div>
      `;
    }

    // ==== RENDER: Wizard Step 3 ====
    function renderConfigRadios(name, field, options) {
      return options.map((o) => `
        <label>
          <input type="radio" name="${name}" value="${o.value}" data-field="config.${field}" ${state.config[field] === o.value ? "checked" : ""} />
          ${escapeHtml(o.label)}
        </label>
      `).join("");
    }

    function renderStep3() {
      return `
        <div class="wizard-content">
          <h3 style="margin:0 0 20px;font-size:16px">Event Configuration</h3>

          <div class="config-section">
            <div class="config-section-title">${STRINGS.configLabels.learningPaths} <i class="fa-regular fa-circle-question" title="Info"></i></div>
            <div class="radio-group">
              ${renderConfigRadios("learningPaths", "learningPaths", [
                { value: "yes", label: "Yes, this event can be added to learning paths and can have learners enrolled via learning paths" },
                { value: "no", label: "No, this event cannot be added to learning paths (but will remain in any it was already added to)" },
              ])}
            </div>
          </div>

          <div class="config-section">
            <div class="config-section-title">${STRINGS.configLabels.enrollment} <i class="fa-regular fa-circle-question"></i></div>
            <div class="radio-group">
              ${renderConfigRadios("enrollment", "enrollment", [
                { value: "invite", label: "Set to invite-only" },
                { value: "self", label: "Set to self-enroll" },
              ])}
            </div>
          </div>

          <div class="config-section">
            <div class="config-section-title">${STRINGS.configLabels.sessionReg} <i class="fa-regular fa-circle-question"></i></div>
            <div class="radio-group">
              ${renderConfigRadios("sessionReg", "sessionReg", [
                { value: "no-self", label: "Do not allow self-registration" },
                { value: "self", label: "Set to self-registration" },
              ])}
            </div>
          </div>

          <div class="config-section">
            <div class="config-section-title">${STRINGS.configLabels.autoAttendance} <i class="fa-regular fa-circle-question"></i></div>
            <div class="radio-group">
              ${renderConfigRadios("autoAttendance", "autoAttendance", [
                { value: "opt-out", label: "Opt out of auto-attendance tracking" },
                { value: "auto", label: "Automatically mark learners as attended when they join the session" },
                { value: "custom", label: "Customize attendance criteria for marking learners as attended" },
              ])}
            </div>
          </div>

          <div class="config-section">
            <div class="config-section-title">${STRINGS.configLabels.selfMark} <i class="fa-regular fa-circle-question"></i></div>
            <div class="toggle-row">
              <span>Allow learners to mark their own attendance for live sessions</span>
              <button type="button" class="toggle ${state.config.selfMark ? "on" : ""}" data-action="toggle-self-mark" aria-pressed="${state.config.selfMark}"></button>
            </div>
          </div>
        </div>
      `;
    }

    // ==== RENDER: Wizard Modal ====
    function renderWizardModal() {
      const stepContent = state.wizardStep === 1 ? renderStep1()
        : state.wizardStep === 2 ? renderStep2()
        : renderStep3();

      const backDisabled = state.wizardStep === 1;
      const nextLabel = state.wizardStep === 3 ? STRINGS.createEvent
        : (state.created && state.wizardStep === 2) ? "Done" : "Next";
      const nextAction = state.wizardStep === 3 ? "create-event"
        : (state.created && state.wizardStep === 2) ? "wizard-done" : "wizard-next";
      const nextDisabled = state.wizardStep === 1 ? !eventStepValid()
        : state.wizardStep === 2 ? !sessionsStepValid()
        : false;

      return `
        <div class="overlay" role="dialog" aria-modal="true">
          <div class="modal modal--wizard">
            <div class="modal-header modal-header--wizard">
              <h2 class="modal-header-title">${STRINGS.createEvent}</h2>
              <button type="button" class="modal-close modal-close--neutral" data-action="close-modal" aria-label="Close">
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
            <div class="wizard-body">
              ${renderSideStepper()}
              <div class="wizard-main">
                <div class="modal-body">${stepContent}</div>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn" data-action="wizard-back" ${backDisabled ? "disabled" : ""}>Back</button>
              <div class="footer-right">
                <button type="button" class="btn" data-action="close-modal">Cancel</button>
                <button type="button" class="btn btn-primary" data-action="${nextAction}" ${nextDisabled ? "disabled" : ""}>${nextLabel}</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ==== RENDER: Overview ====
    function configDisplayValue(field, value) {
      const maps = {
        learningPaths: { yes: "Yes, can be added to learning paths", no: "No, cannot be added to learning paths" },
        enrollment: { invite: "Set to invite-only", self: "Set to self-enroll" },
        sessionReg: { "no-self": "Do not allow self-registration", self: "Set to self-registration" },
        regAttendance: {
          single: "Register for a single session and attend that session",
          "all-all": "Register for all sessions and attend all sessions",
          "all-one": "Register for all sessions and attend at least one session",
        },
        autoAttendance: {
          "opt-out": "Opt out of auto-attendance tracking",
          auto: "Automatically mark learners as attended when they join the session",
          custom: "Customize attendance criteria for marking learners as attended",
        },
      };
      if (field === "selfMark") return value ? "Enabled" : "Disabled";
      return (maps[field] && maps[field][value]) || value;
    }

    function renderOverviewTab() {
      const eventDate = formatEventDateRange(state.sessions);
      const autoTrack = state.config.autoAttendance === "opt-out" ? "Disabled" : "Enabled";
      const hasBanner = isBannerDataUrl(state.event.bannerImage);

      const banner = !state.bannerDismissed.overview ? `
        <div class="info-banner">
          <i class="fa-solid fa-circle-info"></i>
          <span>${STRINGS.infoBannerSession}</span>
          <button type="button" class="dismiss" data-action="dismiss-banner" data-target="overview"><i class="fa-solid fa-xmark"></i></button>
        </div>
      ` : "";

      const sessionCards = state.sessions.length
        ? state.sessions.map(renderSessionCard).join("")
        : `<div class="empty-sessions"><i class="fa-regular fa-calendar-plus"></i>You haven't added any sessions yet.</div>`;

      return `
        <div class="overview-content">
          <div class="event-banner${hasBanner ? " has-image" : ""}">
            ${hasBanner ? `<img class="event-banner-img" src="${state.event.bannerImage}" alt="Event banner" />` : ""}
            <button type="button" class="edit-img" aria-label="Edit image"><i class="fa-regular fa-image"></i></button>
          </div>
          <div class="overview-title-block">
            <h2>${escapeHtml(state.event.title)} <i class="fa-solid fa-pencil" style="font-size:14px;color:var(--primary);cursor:pointer"></i></h2>
            <div class="overview-date"><i class="fa-regular fa-calendar"></i> ${eventDate}</div>
          </div>
          <div class="overview-section">
            <div class="overview-section-header">
              <h3>Sessions</h3>
              <button type="button" class="btn" data-action="add-sessions-overview">Add Sessions</button>
            </div>
            <div class="attendance-note">Auto-Attendance Tracking: <strong>${autoTrack}</strong> | <a href="#" data-action="switch-tab" data-tab="settings">Manage in Settings</a></div>
            ${banner}
            ${sessionCards}
          </div>
          <div class="overview-section">
            <h3>Event Contact</h3>
            <div class="contact-card" style="margin-top:12px">
              <div class="contact-avatar"></div>
              <div>
                <div class="contact-name">${escapeHtml(state.event.contact)}</div>
                <div class="contact-email">${escapeHtml(state.event.contactEmail)}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderSettingsTab() {
      const fields = ["learningPaths", "enrollment", "sessionReg", "regAttendance", "autoAttendance", "selfMark"];
      return `
        <div class="settings-readonly">
          <h3 style="margin:0 0 20px">Event Configuration</h3>
          <p style="color:var(--muted);margin-bottom:24px;font-size:13px">Settings captured during event creation. Full editors for Completion, Roles, Messages, and Notifications remain on the production Settings tab.</p>
          ${fields.map((f) => `
            <div class="config-section">
              <div class="config-section-title">${STRINGS.configLabels[f] || f}</div>
              <div class="readonly-value">${escapeHtml(configDisplayValue(f, state.config[f]))}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderPlaceholderSkeleton(title, note, sections) {
      return `
        <div class="placeholder-tab skeleton-tab">
          <p class="skeleton-tab-note">${note}</p>
          ${sections}
        </div>
      `;
    }

    function renderEnrollmentTab() {
      return renderPlaceholderSkeleton("Enrollment", STRINGS.placeholderTab, `
        <div class="skeleton-section">
          <div class="skeleton-section-header">
            <h3>Learner Enrollment</h3>
            <button type="button" class="btn btn-primary" disabled>Enroll Learners</button>
          </div>
          <div class="skeleton-toolbar">
            <button type="button" class="btn" disabled><i class="fa-solid fa-user-plus"></i> Add from Group</button>
            <button type="button" class="btn" disabled><i class="fa-solid fa-upload"></i> Import CSV</button>
            <button type="button" class="btn" disabled>Remove Selected</button>
          </div>
          <div class="skeleton-table">
            <div class="skeleton-table-head">
              <span>Learner</span><span>Status</span><span>Enrolled On</span><span>Actions</span>
            </div>
            <div class="skeleton-table-row"><span>—</span><span>—</span><span>—</span><span>—</span></div>
            <div class="skeleton-table-row"><span>—</span><span>—</span><span>—</span><span>—</span></div>
          </div>
        </div>
      `);
    }

    function renderRegistrationTab() {
      return renderPlaceholderSkeleton("Registration & Attendance", STRINGS.placeholderTab, `
        <div class="skeleton-stat-grid">
          <div class="skeleton-stat-card"><div class="label">Registered</div><div class="value">0</div></div>
          <div class="skeleton-stat-card"><div class="label">Attended</div><div class="value">0</div></div>
          <div class="skeleton-stat-card"><div class="label">Waitlisted</div><div class="value">0</div></div>
        </div>
        <div class="skeleton-section">
          <div class="skeleton-section-header">
            <h3>Session Registration</h3>
            <button type="button" class="btn" disabled>Export Report</button>
          </div>
          <div class="skeleton-table">
            <div class="skeleton-table-head">
              <span>Session</span><span>Registered</span><span>Capacity</span><span>Waitlist</span>
            </div>
            ${state.sessions.length
              ? state.sessions.map((s) => `
                <div class="skeleton-table-row">
                  <span>${escapeHtml(s.title)}</span><span>0</span><span>${s.regMax || "—"}</span><span>${s.waitlist ? "On" : "Off"}</span>
                </div>
              `).join("")
              : '<div class="skeleton-table-row"><span>No sessions</span><span>—</span><span>—</span><span>—</span></div>'}
          </div>
        </div>
        <div class="skeleton-section">
          <div class="skeleton-section-header">
            <h3>Attendance Tracking</h3>
            <button type="button" class="btn btn-primary" disabled>Mark Attendance</button>
          </div>
          <div class="skeleton-table">
            <div class="skeleton-table-head">
              <span>Learner</span><span>Session</span><span>Status</span><span>Marked By</span>
            </div>
            <div class="skeleton-table-row"><span>—</span><span>—</span><span>—</span><span>—</span></div>
          </div>
        </div>
      `);
    }

    function renderReportsTab() {
      return renderPlaceholderSkeleton("Reports", STRINGS.placeholderTab, `
        <div class="skeleton-section">
          <div class="skeleton-section-header">
            <h3>Event Reports</h3>
            <button type="button" class="btn btn-primary" disabled>Generate Report</button>
          </div>
          <div class="skeleton-toolbar">
            <button type="button" class="btn" disabled>Enrollment Summary</button>
            <button type="button" class="btn" disabled>Attendance by Session</button>
            <button type="button" class="btn" disabled>Completion Status</button>
          </div>
          <div class="skeleton-table">
            <div class="skeleton-table-head">
              <span>Report</span><span>Last Generated</span><span>Format</span><span>Actions</span>
            </div>
            <div class="skeleton-table-row"><span>Enrollment Summary</span><span>—</span><span>CSV</span><span>—</span></div>
            <div class="skeleton-table-row"><span>Session Attendance</span><span>—</span><span>CSV</span><span>—</span></div>
            <div class="skeleton-table-row"><span>Event Completion</span><span>—</span><span>PDF</span><span>—</span></div>
          </div>
        </div>
      `);
    }

    function renderEventPage() {
      const tabs = [
        { id: "overview", label: "Overview" },
        { id: "enrollment", label: "Enrollment" },
        { id: "registration", label: "Registration & Attendance" },
        { id: "reports", label: "Reports" },
        { id: "settings", label: "Settings" },
      ];

      const tabContent = state.activeTab === "overview" ? renderOverviewTab()
        : state.activeTab === "settings" ? renderSettingsTab()
        : state.activeTab === "enrollment" ? renderEnrollmentTab()
        : state.activeTab === "registration" ? renderRegistrationTab()
        : state.activeTab === "reports" ? renderReportsTab()
        : `<div class="placeholder-tab">${STRINGS.placeholderTab}</div>`;

      return `
        <div class="event-page">
          <div class="event-header">
            <div class="event-header-left">
              <div class="event-title-row">
                <button type="button" class="icon-btn" style="color:var(--text);width:28px;height:28px;border:1px solid var(--border)"><i class="fa-solid fa-arrow-left"></i></button>
                <button type="button" class="icon-btn" style="color:var(--text);width:28px;height:28px;border:1px solid var(--border)" data-action="go-home" aria-label="Home" title="Home"><i class="fa-solid fa-house"></i></button>
                <h1>${escapeHtml(state.event.title)}</h1>
              </div>
              <div class="event-meta">
                <span style="width:8px;height:8px;background:var(--primary);border-radius:50%;display:inline-block"></span>
                <a href="#">${escapeHtml(state.event.spot)}</a>
                <span>·</span>
                <span><i class="fa-regular fa-calendar"></i> Event</span>
                <span>·</span>
                <span>Added just now</span>
              </div>
            </div>
            <div class="event-header-actions">
              <button type="button" class="btn btn-teal">Manage Event</button>
              <button type="button" class="btn">View Event</button>
              <button type="button" class="icon-btn" style="color:var(--text);border:1px solid var(--border)"><i class="fa-regular fa-circle-question"></i></button>
              <button type="button" class="icon-btn" style="color:var(--text);border:1px solid var(--border)"><i class="fa-solid fa-ellipsis"></i></button>
            </div>
          </div>
          <div class="event-tabs">
            ${tabs.map((t) => `
              <button type="button" class="event-tab ${state.activeTab === t.id ? "active" : ""}" data-action="switch-tab" data-tab="${t.id}">${t.label}</button>
            `).join("")}
          </div>
          <div class="stats-bar">
            <div class="stat-item"><i class="fa-solid fa-users"></i> <strong>0</strong> Learners</div>
            <div class="stat-item"><i class="fa-regular fa-calendar-check"></i> <strong>0</strong> Learners Registered</div>
            <div class="stat-item"><i class="fa-regular fa-calendar"></i> <strong>0%</strong> Average Event Attendance</div>
          </div>
          ${tabContent}
        </div>
      `;
    }

    // ==== RENDER: Main ====
    function render() {
      const isOverview = state.route === "overview" || location.hash === "#overview";
      const content = isOverview
        ? renderEventPage()
        : renderHomePage();

      let modal = "";
      if (state.modal === "learning") modal = renderNewLearningModal();
      else if (state.modal === "wizard") modal = renderWizardModal();

      document.getElementById("app").innerHTML = renderShell(content) + modal;
      bindEvents();
      updateWizardButtons();
    }

    // ==== HANDLERS ====
    function setField(path, value) {
      const parts = path.split(".");
      let obj = state;
      for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
      obj[parts[parts.length - 1]] = value;
      saveState(state);
    }

    function updateWizardButtons() {
      const app = document.getElementById("app");
      if (state.modal !== "wizard") return;
      const nextBtn = app.querySelector('[data-action="wizard-next"], [data-action="create-event"]');
      if (state.wizardStep === 1 && nextBtn) nextBtn.disabled = !eventStepValid();
      if (state.wizardStep === 2 && nextBtn) nextBtn.disabled = !sessionsStepValid();
    }

    function bindEvents() {
      const app = document.getElementById("app");

      app.querySelectorAll("[data-action]").forEach((el) => {
        el.addEventListener("click", (e) => {
          const action = el.getAttribute("data-action");
          handleAction(action, el, e);
        });
      });

      app.querySelectorAll("[data-field]").forEach((el) => {
        const eventType = el.type === "checkbox" || el.type === "radio" ? "change" : "input";
        el.addEventListener(eventType, () => {
          const path = el.getAttribute("data-field");
          let value;
          if (el.type === "checkbox") value = el.checked;
          else if (el.type === "radio") { if (!el.checked) return; value = el.value; }
          else value = el.value;
          setField(path, value);
          if (path === "sessionForm.type") {
            if (value === "in-person") {
              state.sessionForm.conferenceProvider = "";
              saveState(state);
            }
            render();
            return;
          }
          if (path === "sessionForm.conferenceProvider") {
            if (state.showSessionFormValidation) render();
            else updateWizardButtons();
            return;
          }
          if (path.startsWith("sessionForm.") && state.showSessionFormValidation) {
            render();
            return;
          }
          updateWizardButtons();
        });
      });

      const bannerInput = app.querySelector("#banner-file-input");
      if (bannerInput) {
        bannerInput.addEventListener("change", () => {
          const file = bannerInput.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            state.event.bannerImage = reader.result;
            saveState(state);
            render();
          };
          reader.readAsDataURL(file);
        });
      }
    }

    function handleAction(action, el, e) {
      e.preventDefault();

      switch (action) {
        case "go-home":
          state.modal = null;
          saveState(state);
          navigate("#home");
          break;

        case "open-learning":
          state.modal = "learning";
          state.selectedLearningType = "event";
          saveState(state);
          navigate("#new-learning");
          break;

        case "open-event-wizard":
          resetForNewEvent();
          state.modal = "wizard";
          state.selectedLearningType = "event";
          state.wizardBackdrop = "home";
          saveState(state);
          navigate("#create/1");
          break;

        case "load-sample-event":
          loadSampleEvent();
          break;

        case "reset-demo":
          localStorage.removeItem(STORAGE_KEY);
          state = getDefaultState();
          navigate("#home");
          break;

        case "close-modal":
          state.modal = null;
          state.showValidation = false;
          if (state.created) navigate("#overview");
          else navigate("#home");
          break;

        case "select-learning":
          state.selectedLearningType = el.getAttribute("data-id");
          saveState(state);
          render();
          break;

        case "learning-next":
          if (state.selectedLearningType !== "event") return;
          resetForNewEvent();
          state.modal = "wizard";
          state.wizardBackdrop = "home";
          saveState(state);
          navigate("#create/1");
          break;

        case "wizard-back":
          if (state.wizardStep > 1) {
            state.wizardStep--;
            navigate("#create/" + state.wizardStep);
          }
          break;

        case "wizard-next":
          if (state.wizardStep === 1 && !eventStepValid()) {
            state.showValidation = true;
            saveState(state);
            render();
            return;
          }
          if (state.wizardStep === 2 && !sessionsStepValid()) {
            state.showValidation = true;
            saveState(state);
            render();
            return;
          }
          state.showValidation = false;
          state.showSessionFormValidation = false;
          if (state.wizardStep < 3) {
            state.wizardStep++;
            if (state.wizardStep === 2) syncSessionFormInstructorsFromEvent();
            navigate("#create/" + state.wizardStep);
          }
          break;

        case "add-sessions-overview":
          state.modal = "wizard";
          state.wizardStep = 2;
          state.showValidation = false;
          state.wizardBackdrop = "overview";
          syncSessionFormInstructorsFromEvent();
          saveState(state);
          navigate("#create/2");
          break;

        case "wizard-done":
          state.modal = null;
          state.showValidation = false;
          navigate("#overview");
          break;

        case "create-event":
          state.created = true;
          state.modal = null;
          state.activeTab = "overview";
          navigate("#overview");
          break;

        case "upload-banner": {
          const input = document.getElementById("banner-file-input");
          if (input) input.click();
          break;
        }

        case "remove-event-instructor": {
          const index = parseInt(el.getAttribute("data-index"), 10);
          state.event.sessionInstructors = (state.event.sessionInstructors || []).filter((_, i) => i !== index);
          saveState(state);
          render();
          break;
        }

        case "remove-instructor": {
          const index = parseInt(el.getAttribute("data-index"), 10);
          if (state.sessionForm.instructors.length <= 1) return;
          state.sessionForm.instructors = state.sessionForm.instructors.filter((_, i) => i !== index);
          saveState(state);
          render();
          updateWizardButtons();
          break;
        }

        case "save-session": {
          const f = { ...state.sessionForm, id: state.editingSessionId || "s-" + Date.now() };
          if (!sessionFormValid(f)) {
            state.showSessionFormValidation = true;
            saveState(state);
            render();
            return;
          }
          state.showSessionFormValidation = false;
          if (state.editingSessionId) {
            state.sessions = state.sessions.map((s) => s.id === state.editingSessionId ? f : s);
            state.editingSessionId = null;
          } else {
            state.sessions.push(f);
          }
          state.sessionForm = emptySessionForm();
          saveState(state);
          render();
          break;
        }

        case "add-another-session": {
          const last = state.sessions[state.sessions.length - 1];
          if (!last) return;
          state.sessionForm = carryForwardSessionForm(last);
          state.editingSessionId = null;
          saveState(state);
          render();
          requestAnimationFrame(() => {
            const panel = document.getElementById("session-form-panel");
            if (panel) panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
            const titleInput = panel?.querySelector('[data-field="sessionForm.title"]');
            if (titleInput) titleInput.focus();
          });
          break;
        }

        case "edit-session": {
          const id = el.getAttribute("data-id");
          const session = state.sessions.find((s) => s.id === id);
          if (session) {
            state.editingSessionId = id;
            state.sessionForm = { ...session };
            state.showSessionFormValidation = false;
            state.integrationsPanelOpen = false;
            saveState(state);
            render();
          }
          break;
        }

        case "cancel-edit-session":
          state.editingSessionId = null;
          state.sessionForm = emptySessionForm();
          state.showSessionFormValidation = false;
          saveState(state);
          render();
          break;

        case "remove-session": {
          const id = el.getAttribute("data-id");
          state.sessions = state.sessions.filter((s) => s.id !== id);
          if (state.editingSessionId === id) {
            state.editingSessionId = null;
            state.sessionForm = emptySessionForm();
          }
          saveState(state);
          render();
          break;
        }

        case "toggle-self-mark":
          state.config.selfMark = !state.config.selfMark;
          saveState(state);
          render();
          break;

        case "dismiss-banner":
          state.bannerDismissed[el.getAttribute("data-target")] = true;
          saveState(state);
          render();
          break;

        case "switch-tab":
          state.activeTab = el.getAttribute("data-tab");
          saveState(state);
          render();
          break;

        case "toggle-integrations-panel":
          state.integrationsPanelOpen = !state.integrationsPanelOpen;
          saveState(state);
          render();
          break;

        case "link-integration": {
          const provider = el.getAttribute("data-provider");
          state.integrations[provider] = {
            linked: true,
            email: "david.davidson@highspot.com",
            linkedOn: new Date().toLocaleDateString("en-US"),
          };
          state.integrationsPanelOpen = true;
          saveState(state);
          render();
          break;
        }

        case "unlink-integration": {
          const provider = el.getAttribute("data-provider");
          state.integrations[provider] = { linked: false, email: null, linkedOn: null };
          if (state.sessionForm.conferenceProvider === provider) {
            state.sessionForm.conferenceProvider = "";
          }
          saveState(state);
          render();
          break;
        }
      }
    }

    // ==== INIT ====
    (function init() {
      const parsed = parseHash();
      state.route = parsed.route;
      state.modal = parsed.modal;
      state.wizardStep = parsed.wizardStep;
      if (parsed.route === "overview") state.created = true;
      if (!location.hash) location.hash = "home";
      render();
    })();
  </script>
</body>
</html>
